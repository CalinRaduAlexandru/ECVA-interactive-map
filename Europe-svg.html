  baseprofile="tiny"
  fill="#E5E5E5"
  height="684"
  stroke="black"
  stroke-linecap="round"
  stroke-linejoin="round"
  stroke-width=".1"

  width="100%"

  <style>
    @keyframes mapReveal {
      0% {
        opacity: 0;
        transform: scale(0.985);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes legendDropIn {
      0% {
        opacity: 0;
        transform: translateY(-42px) scale(0.99);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes pillFadeIn {
      0% {
        opacity: 0;
        filter: blur(1.5px);
      }
      100% {
        opacity: 1;
        filter: blur(0);
      }
    }

    #map-frame {
      pointer-events: none;
      transform-origin: center;
      animation: mapReveal 0.74s cubic-bezier(0.22, 1, 0.36, 1) 0s both;
    }

    path {
      fill: #e6e6e6;
      stroke: #aeb8bd;
      stroke-width: 0.35;
      stroke-linejoin: round;
      stroke-linecap: round;
      paint-order: stroke fill;
      transition: fill 0.2s ease;
      transform-origin: center;
      animation: mapReveal 0.74s cubic-bezier(0.22, 1, 0.36, 1) 0s both;
    }

    #GB {
      fill: #253a46;
      stroke: #6f8894;
      stroke-width: 1;
      vector-effect: non-scaling-stroke;
      filter: brightness(1) saturate(1);
      transition:
        fill 0.24s ease,
        stroke 0.24s ease,
        filter 0.44s cubic-bezier(0.22, 0.61, 0.36, 1),
        stroke-width 0.44s cubic-bezier(0.22, 0.61, 0.36, 1),
        transform 0.44s cubic-bezier(0.22, 0.61, 0.36, 1);
      will-change: transform, filter, stroke-width;
      cursor: pointer;
    }

    #ES,
    #AT,
    #CZ,
    #DK {
      fill: #395563;
      stroke: #6f8894;
      stroke-width: 1;
      vector-effect: non-scaling-stroke;
      filter: brightness(1) saturate(1);
      transition:
        fill 0.24s ease,
        stroke 0.24s ease,
        filter 0.44s cubic-bezier(0.22, 0.61, 0.36, 1),
        stroke-width 0.44s cubic-bezier(0.22, 0.61, 0.36, 1),
        transform 0.44s cubic-bezier(0.22, 0.61, 0.36, 1);
      will-change: transform, filter, stroke-width;
      cursor: pointer;
    }

    #EE,
    #FI,
    #FR,
    #DE,
    #GR,
    #IS,
    #RO,
    #SE {
      fill: #537686;
      stroke: #6f8894;
      stroke-width: 3;
      vector-effect: non-scaling-stroke;
      filter: brightness(1) saturate(1);
      transition:
        fill 0.24s ease,
        stroke 0.24s ease,
        filter 0.44s cubic-bezier(0.22, 0.61, 0.36, 1),
        stroke-width 0.44s cubic-bezier(0.22, 0.61, 0.36, 1),
        transform 0.44s cubic-bezier(0.22, 0.61, 0.36, 1);
      will-change: transform, filter, stroke-width;
      cursor: pointer;
    }

    #GB:hover {
      fill: #1d2f39;
    }

    #ES:hover,
    #AT:hover,
    #CZ:hover,
    #DK:hover {
      fill: #395867;
    }

    #EE:hover,
    #FI:hover,
    #FR:hover,
    #DE:hover,
    #GR:hover,
    #IS:hover,
    #RO:hover,
    #SE:hover {
      fill: #55798a;
    }

    :is(
      #GB,
      #ES,
      #AT,
      #CZ,
      #DK,
      #EE,
      #FI,
      #FR,
      #DE,
      #GR,
      #IS,
      #RO,
      #SE
    ).is-lifted,
    :is(
        #GB,
        #ES,
        #AT,
        #CZ,
        #DK,
        #EE,
        #FI,
        #FR,
        #DE,
        #GR,
        #IS,
        #RO,
        #SE
      ).is-lifted:hover {
      stroke: #9fb3bd;
    }

    .country-trail {
      pointer-events: none;
      fill: none;
      stroke: #9fb3bd;
      stroke-width: 2.8;
      vector-effect: non-scaling-stroke;
      stroke-linejoin: round;
      stroke-linecap: round;
      paint-order: stroke fill;
      opacity: 0;
      transform: translateY(0);
      transform-origin: center;
    }

    .country-trail.is-on {
      opacity: 1;
      transform: translateY(5px);
    }

    .country-label {
      pointer-events: none;
      transform-origin: center;
      transition:
        transform 0.18s ease,
        filter 0.18s ease;
      transform: translate(var(--tx, 0px), var(--ty, 0px));
      opacity: 0;
      animation: pillFadeIn 0.44s ease var(--pill-delay, 1.05s) forwards;
    }

    .country-label.is-hover {
      filter: brightness(1.1);
      transform: translate(var(--tx, 0px), var(--ty, 0px)) scale(1.015);
    }

    .country-label .pill-bg {
      fill: rgba(243, 247, 248, 0.95);
      stroke: #6f8894;
      stroke-width: 2;
    }

    .country-label .pill-text,
    .country-label .code {
      text-anchor: middle;
      font-family: "Alexandria", sans-serif;
      dominant-baseline: middle;
    }

    .country-label .flag {
      font-size: 18.75px;
      stroke: none;
      font-family:
        "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif;
    }

    .country-label .code {
      fill: #2a414c;
      font-weight: 700;
      font-size: 13.5px;
    }

    .country-label-loader {
      display: none;
      pointer-events: none;
    }

    .country-label.is-loading .country-label-loader {
      display: inline;
    }

    .country-label-loader .loader-bg {
      fill: rgba(243, 247, 248, 0.96);
      stroke: #6f8894;
      stroke-width: 1.2;
    }

    .country-label-loader .loader-ring {
      fill: none;
      stroke: #2f4a58;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-dasharray: 14 10;
      animation: countryPillLoaderDash 0.82s linear infinite;
    }

    @keyframes countryPillLoaderDash {
      to {
        stroke-dashoffset: -24;
      }
    }

    #map-legend {
      pointer-events: auto;
      opacity: 0;
      transform: translateY(-42px);
      animation: legendDropIn 0.98s cubic-bezier(0.22, 0.72, 0.2, 1) 0.78s
        forwards;
    }

    .legend-card {
      box-sizing: border-box;
      width: fit-content;
      height: auto;
      padding: 1px 24px;
      border-radius: 14px;
      border: 1px solid rgba(123, 147, 158, 0.6);
      background: linear-gradient(
        180deg,
        rgba(250, 251, 246, 0.98) 0%,
        rgba(246, 248, 242, 0.98) 100%
      );
      box-shadow: 0 10px 22px rgba(42, 65, 76, 0.08);
      backdrop-filter: blur(2px);
      font-family: "Alexandria", sans-serif;
      color: #2a414c;
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }

    .legend-logo {
      margin-top: 6px;
      width: 184px;
      height: 56px;
      display: block;
      object-fit: contain;
      transform: translateY(-1px);
      cursor: pointer;
    }

    .legend-meta {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .legend-title {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin: 0;
    }

    .legend-row {
      display: flex;
      gap: 14px;
      align-items: center;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .legend-swatch {
      width: 20px;
      height: 20px;
      border-radius: 44px;
      border: 1px solid rgba(42, 65, 76, 0.35);
      box-sizing: border-box;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 800;
      color: #ffffff;
      line-height: 1;
    }

    .legend-leading {
      background: #1d2f39;
    }

    .legend-development {
      background: #55798a;
    }

    .legend-momentum {
      background: #304a57;
    }
  </style>

            function escapeHtml(value) {
              return String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
            }

            function formatItem(item) {
              if (!item) return "";
              const text = String(item).trim();
              if (text.includes(":")) {
                const idx = text.indexOf(":");
                const head = text.slice(0, idx).trim();
                const tail = text.slice(idx + 1).trim();
                if (head.length > 0 && tail.length > 0) {
                  return `<strong>${escapeHtml(head)}:</strong> ${escapeHtml(tail)}`;
                }
              }
              const words = text.split(/\s+/);
              if (words.length <= 3) return `<strong>${escapeHtml(text)}</strong>`;
              const lead = words.slice(0, 3).join(" ");
              const rest = words.slice(3).join(" ");
              return `<strong>${escapeHtml(lead)}</strong> ${escapeHtml(rest)}`;
            }

            function renderSection(title, items) {
              if (!items || !items.length) return "";
              const list = items
                .map((item) => `<li>${formatItem(item)}</li>`)
                .join("");
              const sectionClass =
                title === "Outlook" ? "country-modal-section outlook" : "country-modal-section";
              return `<section class="${sectionClass}"><h4>${escapeHtml(title)}</h4><ul>${list}</ul></section>`;
            }

            function getPillarConfig(countryId, pillarId) {
              const countryConfig = pillarConfigByCountry[countryId] || {};
              const pillarConfig = countryConfig[pillarId];
              if (pillarConfig && typeof pillarConfig === "object") {
                const entries = Array.isArray(pillarConfig.entries)
                  ? pillarConfig.entries.filter((entry) => entry && typeof entry === "object")
                  : [];
                return {
                  active: Boolean(pillarConfig.active),
                  entries,
                };
              }
              const fallbackFlag =
                countryInfo[countryId] && countryInfo[countryId].flag
                  ? countryInfo[countryId].flag
                  : "🏳️";
              return {
                active: false,
                entries: [makeEntry(fallbackFlag)],
              };
            }

            function getLanguageCounts(entries) {
              const counts = new Map();
              entries.forEach((entry) => {
                const langsRaw = Array.isArray(entry.languages) ? entry.languages : [];
                const uniqueLangs = [...new Set(langsRaw
                  .map((lang) => String(lang || "").trim())
                  .filter(Boolean))];
                uniqueLangs.forEach((lang) => {
                  counts.set(lang, (counts.get(lang) || 0) + 1);
                });
              });
              return Array.from(counts.entries());
            }

            function renderPillarTooltip(pillarId) {
              const tooltip = pillarInfoText[pillarId];
              if (!tooltip) return "";
              const paragraphs = tooltip.paragraphs
                .map((paragraph) => `<p>${escapeHtml(paragraph)}</p>`)
                .join("");
              return `
                <div class="country-modal-info-tooltip" role="tooltip">
                  <h5>${escapeHtml(tooltip.title)}</h5>
                  ${paragraphs}
                </div>
              `;
            }

                    .map((entry, idx) => {

                      const badges = Array.isArray(entry.badges)

                        : [];
                      const summary =
                        String(entry.summary || "").trim() ||
                        String(entry.description || "").trim();
                      const highlights = Array.isArray(entry.highlights)
                        ? entry.highlights.filter(Boolean)
                        : [];
                      const methods = Array.isArray(entry.methods)
                        ? entry.methods.filter(Boolean)
                        : [];
                      const programs = Array.isArray(entry.programs)
                        ? entry.programs.filter(Boolean)
                        : [];
                      const impact = Array.isArray(entry.impact)
                        ? entry.impact.filter(Boolean)
                        : [];
                      const langs = Array.isArray(entry.languages)
                        ? entry.languages
                            .map((lang) => String(lang || "").trim())
                            .filter(Boolean)
                        : [];
                      const flagsInline = langs.length
                        ? langs
                            .map(
                              (flag) =>
                                `<span class="country-modal-entry-flag-item">${escapeHtml(flag)}</span>`,
                            )
                            .join("")
                        : `<span class="country-modal-entry-flag-item">-</span>`;
                      const extraDemoText = escapeHtml(
                        "This is demo extended information to preview how deeper context, evidence notes, and implementation guidance can be displayed after expansion.",
                      );
                      const demoName = escapeHtml("Alex Morgan");
                      const demoRole = escapeHtml("Country Representative (Demo)");
                      const demoEmail = escapeHtml("representative@example.org");
                      const demoPhone = escapeHtml("+40 700 000 000");
                      const highlightHtml = highlights.length
                        ? `
                          <ul class="country-modal-entry-highlights">
                            ${highlights
                              .slice(0, 3)
                              .map((item) => `<li>${escapeHtml(item)}</li>`)
                              .join("")}
                          </ul>
                        `
                        : "";
                      const methodsHtml = methods.length
                        ? `
                          <section class="country-modal-entry-block">
                            <h6>Methods</h6>
                            <div class="country-modal-entry-chip-row">
                              ${methods
                                .map((item) => `<span class="country-modal-entry-chip">${escapeHtml(item)}</span>`)
                                .join("")}
                            </div>
                          </section>
                        `
                        : "";
                      const programsHtml = programs.length
                        ? `
                          <section class="country-modal-entry-block">
                            <h6>Programs</h6>
                            <ul class="country-modal-entry-listing">
                              ${programs.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}
                            </ul>
                          </section>
                        `
                        : "";
                      const impactHtml = impact.length
                        ? `
                          <section class="country-modal-entry-block">
                            <h6>Impact</h6>
                            <ul class="country-modal-entry-listing">
                              ${impact.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}
                            </ul>
                          </section>
                        `
                        : "";
                      const organisationBadgesHtml = pillar.id === "organisations"
                        ? `
                          <div class="country-modal-entry-meta">
                            <span class="country-modal-entry-meta-pill">
                              <span class="country-modal-entry-meta-icon">🏢</span>
                              <span>NGO</span>
                            </span>
                            <span class="country-modal-entry-meta-pill">
                              <span class="country-modal-entry-meta-icon">👤</span>
                              <span>Founder: ${escapeHtml(String(entry.founder || "Name").trim() || "Name")}</span>
                            </span>
                          </div>
                        `
                        : "";
                      const badgesHtml = !organisationBadgesHtml && badges.length
                        ? `
                          <div class="country-modal-entry-meta">
                            ${badges
                              .map((badge) => {
                                const icon = escapeHtml(String(badge.icon || "").trim());
                                const text = escapeHtml(String(badge.text || "").trim());
                                return `<span class="country-modal-entry-meta-pill"><span class="country-modal-entry-meta-icon">${icon}</span><span>${text}</span></span>`;
                              })
                              .join("")}
                          </div>
                        `
                        : organisationBadgesHtml;
                      return `
                        <article class="country-modal-entry" data-entry-index="${idx}" data-entry-pillar="${escapeHtml(pillar.id)}" data-entry-country="${escapeHtml(countryId)}">
                          <div class="country-modal-entry-top">
                            <h5>${title || `Entry ${idx + 1}`}</h5>
                            <span class="country-modal-entry-flag">${flagsInline}</span>
                          </div>
                          ${badgesHtml}
                          ${subtitle ? `<p class="country-modal-entry-subtitle">${escapeHtml(subtitle)}</p>` : ""}
                          ${summary ? `<p class="country-modal-entry-description">${escapeHtml(summary)}</p>` : ""}
                          ${highlightHtml}
                          <div class="country-modal-entry-actions">
                            <button class="country-modal-entry-btn country-modal-entry-readmore-btn" type="button" aria-expanded="false">Read More</button>
                          </div>
                          <div class="country-modal-entry-expand" hidden>
                            ${methodsHtml}
                            ${programsHtml}
                            ${impactHtml}
                            ${!methods.length && !programs.length && !impact.length ? `<p class="country-modal-entry-extra">${extraDemoText}</p>` : ""}
                            <div class="country-modal-entry-contact">
                              <h6>Contact Representative</h6>
                              <p><strong>Name:</strong> ${demoName}</p>
                              <p><strong>Role:</strong> ${demoRole}</p>
                              <p><strong>Email:</strong> ${demoEmail}</p>
                              <p><strong>Phone:</strong> ${demoPhone}</p>
                            </div>
                          </div>
                        </article>
                      `;
                    })
                    .join("");

                  return `
                    <section class="country-modal-detail-card" data-pillar-card="${escapeHtml(pillar.id)}" id="pillar-${escapeHtml(pillar.id)}">
                      <h4>${escapeHtml(pillar.bottom)}</h4>
                      <div class="country-modal-entry-list">
                        ${entryHtml || `<p class="country-modal-detail-empty">No entries added yet.</p>`}
                      </div>
                    </section>
                  `;
                })
                .join("");
              if (cards.trim()) return cards;
              return `
                <section class="country-modal-detail-card country-modal-detail-fallback">
                  <p class="country-modal-detail-empty">No more info to show.</p>
                </section>
              `;
            }

            function renderPillarItems(countryId) {
              return pillarTemplate
                .map((pillar) => {
                  const config = getPillarConfig(countryId, pillar.id);
                  const pillarThemeClass = `is-${pillar.id}`;
                  const symbolSvg = pillarSymbolSvgs[pillar.id] || pillarSymbolSvgs.resources;
                  const languageCounts = getLanguageCounts(config.entries);
                  const dotTextHtml = config.active
                    ? `
                    <span class="country-modal-pillar-symbol" aria-hidden="true">${symbolSvg}</span>
                    <span class="country-modal-pillar-dot-meta">
                      ${languageCounts
                        .map(
                          ([flag, count]) =>
                            `<span class="country-modal-pillar-dot-item"><strong>${count}</strong><span>${escapeHtml(flag)}</span></span>`,
                        )
                        .join("")}
                    </span>
                    `
                    : `
                    <span class="country-modal-pillar-symbol" aria-hidden="true">${symbolSvg}</span>
                    <span class="country-modal-pillar-dot-text">Pending</span>
                    `;
                  const ctaHtml = `
                    <div class="country-modal-pillar-cta-row">
                      <button class="country-modal-see-more-btn${config.active ? "" : " is-hidden"}" type="button" data-pillar-target="${escapeHtml(pillar.id)}">See More</button>
                    </div>
                  `;
                  return `
                  <article class="country-modal-pillar ${config.active ? "is-active" : "is-unavailable"} ${escapeHtml(pillarThemeClass)}">
                    <span class="country-modal-pillar-dot">${dotTextHtml}</span>
                    <strong class="country-modal-pillar-bottom">${escapeHtml(pillar.bottom)}</strong>
                    <div class="country-modal-pillar-actions">
                      <button class="country-modal-contribute-btn" type="button" data-contribute-pillar="${escapeHtml(pillar.id)}" data-contribute-label="${escapeHtml(pillar.bottom)}">Contribute</button>
                    </div>
                    ${ctaHtml}
                  </article>
                `;
                })
                .join("");
            }

            function renderModalHtml(countryId) {
              const info = countryInfo[countryId];
              if (!info) return "";
              return `
                <div class="country-modal-header">
                  <div class="country-modal-top">
                    <div class="country-modal-identity">
                      <span class="country-modal-hero-flag">${escapeHtml(info.flag)}</span>
                      <span class="country-modal-hero-name">${escapeHtml(info.name)}</span>
                      <span class="country-modal-hero-status">(${escapeHtml(countryStatus[countryId] || "-")})</span>
                    </div>
                    <div class="country-modal-pillars">
                      ${renderPillarItems(countryId)}
                    </div>
                  </div>
                  <div class="country-modal-outlook-inline">
                    ${renderOutlookPanel(countryId, info)}
                  </div>
                  <hr class="country-modal-divider" />
                </div>
                <div class="country-modal-grid">
                  ${renderPillarDetailCards(countryId)}
                </div>
              `;
            }

            function openParentModal(countryId) {
              if (!countryInfo[countryId]) return;
              window.parent.postMessage(
                {
                  type: "ecva-scroll-parent-top",
                },
                "*",
              );
              window.parent.postMessage(
                {
                  type: "ecva-open-country-modal",
                  payload: {
                    countryId,
                    html: renderModalHtml(countryId),
                  },
                },
                "*",
              );
            }

            function getActiveCountriesPayload() {
              const codes = Array.from(
                new Set(
                  Array.from(document.querySelectorAll("#country-labels .country-label"))
                    .map((node) => String(node.getAttribute("data-country") || "").trim())
                    .filter(Boolean),
                ),
              );
              return codes
                .filter((code) => countryInfo[code])
                .map((code) => {
                  const info = countryInfo[code];
                  return {
                    code,
                    name: String(info.name || code),
                    flag: String(info.flag || ""),
                    status: String(countryStatus[code] || ""),
                  };
                });
            }

            function getEditorStateSnapshot() {
              const snapshot = JSON.parse(JSON.stringify(pillarConfigByCountry));
              snapshot.__representatives = JSON.parse(JSON.stringify(representativesByCountry));
              return snapshot;
            }

            function applyEditorState(nextState) {
              if (!nextState || typeof nextState !== "object") return;
              const representativeState =
                nextState.__representatives && typeof nextState.__representatives === "object"
                  ? nextState.__representatives
                  : null;
              if (representativeState) {
                Object.entries(representativeState).forEach(([countryId, reps]) => {
                  if (!Array.isArray(reps)) return;
                  representativesByCountry[countryId] = reps
                    .filter((rep) => rep && typeof rep === "object")
                    .map((rep) => ({
                      image: String(rep.image || "").trim(),
                      sourceImage: String(rep.sourceImage || rep.image || "").trim(),
                      name: String(rep.name || "").trim(),
                      title: String(rep.title || "").trim(),
                      organisation: String(rep.organisation || "").trim(),
                      crop:
                        rep.crop && typeof rep.crop === "object"
                          ? {
                              x: Number(rep.crop.x),
                              y: Number(rep.crop.y),
                              w: Number(rep.crop.w),
                              h: Number(rep.crop.h),
                            }
                          : undefined,
                    }));
                });
              }

              Object.entries(nextState).forEach(([countryId, countryValue]) => {
                if (countryId.startsWith("__")) return;
                if (!countryValue || typeof countryValue !== "object") return;
                if (!pillarConfigByCountry[countryId] || typeof pillarConfigByCountry[countryId] !== "object") {
                  pillarConfigByCountry[countryId] = {};
                }
                Object.entries(countryValue).forEach(([pillarId, pillarValue]) => {
                  if (!pillarValue || typeof pillarValue !== "object") return;
                  const target = pillarConfigByCountry[countryId][pillarId];
                  if (!target || typeof target !== "object") {
                    pillarConfigByCountry[countryId][pillarId] = {};
                  }
                  if (typeof pillarValue.active === "boolean") {
                    pillarConfigByCountry[countryId][pillarId].active = pillarValue.active;
                  }
                  if (Array.isArray(pillarValue.entries)) {
                    pillarConfigByCountry[countryId][pillarId].entries = pillarValue.entries.map((entry) =>
                      entry && typeof entry === "object" ? { ...entry } : entry,
                    );
                  }
                });
              });
            }

            function normalizeRepresentative(rep) {
              const next = rep && typeof rep === "object" ? rep : {};
              const image = String(next.image || "").trim() || "https://placehold.co/700x520/e6eef3/e6eef3.png";
              const sourceImage = String(next.sourceImage || image).trim() || image;
              const name = String(next.name || "").trim() || "Representative Name";
              const title = String(next.title || "").trim() || "Country Representative";
              const organisation = String(next.organisation || "").trim() || "National Character Education Network";
              const rawCrop =
                next.crop && typeof next.crop === "object"
                  ? {
                      x: Number(next.crop.x),
                      y: Number(next.crop.y),
                      w: Number(next.crop.w),
                      h: Number(next.crop.h),
                    }
                  : null;
              const crop =
                rawCrop &&
                Number.isFinite(rawCrop.x) &&
                Number.isFinite(rawCrop.y) &&
                Number.isFinite(rawCrop.w) &&
                Number.isFinite(rawCrop.h)
                  ? rawCrop
                  : undefined;
              return { image, sourceImage, name, title, organisation, crop };
            }

            function updateEntryFromEditor(payload) {
              if (!payload || typeof payload !== "object") return null;
              const countryId = String(payload.countryId || "").trim();
              const pillarId = String(payload.pillarId || "").trim();
              const index = Number(payload.entryIndex);
              const fields =
                payload.fields && typeof payload.fields === "object" ? payload.fields : {};
              if (!countryId || !pillarId || !Number.isInteger(index) || index < 0) return null;
              const country = pillarConfigByCountry[countryId];
              if (!country || typeof country !== "object") return null;
              const pillar = country[pillarId];
              if (!pillar || !Array.isArray(pillar.entries)) return null;
              const entry = pillar.entries[index];
              if (!entry || typeof entry !== "object") return null;

              ["title", "subtitle", "summary", "description"].forEach((key) => {
                if (Object.prototype.hasOwnProperty.call(fields, key)) {
                  entry[key] = String(fields[key] || "").trim();
                }
              });
              return { countryId, pillarId, entryIndex: index };
            }

            function updateRepresentativeFromEditor(payload) {
              if (!payload || typeof payload !== "object") return null;
              const countryId = String(payload.countryId || "").trim();
              const index = Number(payload.representativeIndex);
              const representative = normalizeRepresentative(payload.representative);
              if (!countryId || !Number.isInteger(index) || index < 0) return null;
              if (!Array.isArray(representativesByCountry[countryId])) {
                representativesByCountry[countryId] = [];
              }
              if (!representativesByCountry[countryId][index]) return null;
              representativesByCountry[countryId][index] = representative;
              return { countryId, representativeIndex: index };
            }

            function addRepresentativeFromEditor(payload) {
              if (!payload || typeof payload !== "object") return null;
              const countryId = String(payload.countryId || "").trim();
              const representative = normalizeRepresentative(payload.representative);
              if (!countryId) return null;
              if (!Array.isArray(representativesByCountry[countryId])) {
                representativesByCountry[countryId] = [];
              }
              representativesByCountry[countryId].push(representative);
              return { countryId, representativeIndex: representativesByCountry[countryId].length - 1 };
            }

            function removeRepresentativeFromEditor(payload) {
              if (!payload || typeof payload !== "object") return null;
              const countryId = String(payload.countryId || "").trim();
              const index = Number(payload.representativeIndex);
              if (!countryId || !Number.isInteger(index) || index < 0) return null;
              if (!Array.isArray(representativesByCountry[countryId])) return null;
              if (!representativesByCountry[countryId][index]) return null;
              representativesByCountry[countryId].splice(index, 1);
              return { countryId, representativeIndex: index };
            }

            function sizeLegend() {
              const width = Math.ceil(legendCard.scrollWidth);
              const height = Math.ceil(legendCard.scrollHeight);
              const finalWidth = width + 4;
              const finalHeight = height + 4;
              legend.setAttribute("width", finalWidth);
              legend.setAttribute("height", finalHeight);
              const x = frameBox.x + (frameBox.width - finalWidth) / 2;
              const y = frameBox.y + 34;
              legend.setAttribute("x", x.toFixed(1));
              legend.setAttribute("y", y.toFixed(1));
            }

            const labels = document.querySelectorAll("#country-labels .country-label");
            const labelsLayer = document.getElementById("country-labels");
            const trailLayer = document.getElementById("country-trail-layer");
            const mapRoot = document.querySelector("svg");
            const labelByCountry = new Map();
            let hoveredCountryPath = null;
            let activeTrail = null;
            let loadingCountryCode = "";

            function bringCountryAbove(pathEl) {
              if (!pathEl || !pathEl.parentNode) return;
              const parent = pathEl.parentNode;
              const anchor = trailLayer && trailLayer.parentNode === parent ? trailLayer : labelsLayer;
              if (!anchor || anchor.parentNode !== parent) return;
              parent.insertBefore(pathEl, anchor);
            }

            function ensureActiveTrail() {
              if (!trailLayer) return null;
              if (activeTrail) return activeTrail;
              activeTrail = document.createElementNS("http://www.w3.org/2000/svg", "path");
              activeTrail.classList.add("country-trail");
              trailLayer.appendChild(activeTrail);
              return activeTrail;
            }

            function showCountryTrail(pathEl) {
              if (!pathEl) return;
              const trail = ensureActiveTrail();
              if (!trail) return;
              const d = pathEl.getAttribute("d");
              if (!d) return;
              trail.setAttribute("d", d);
              requestAnimationFrame(() => {
                trail.classList.add("is-on");
              });
            }

            function hideCountryTrail() {
              const trail = activeTrail;
              if (!trail) return;
              trail.classList.remove("is-on");
            }

            function clearAllCountryHoverStates(exceptPath) {
              labels.forEach((labelNode) => {
                const code = labelNode.getAttribute("data-country");
                const pathNode = code ? document.getElementById(code) : null;
                if (!pathNode || pathNode === exceptPath) return;
                labelNode.classList.remove("is-hover");
                pathNode.classList.remove("is-lifted");
              });
              if (!exceptPath) {
                hideCountryTrail();
              }
            }

            function setHoveredCountry(pathNode) {
              if (hoveredCountryPath === pathNode) return;
              clearAllCountryHoverStates(pathNode || null);
              hoveredCountryPath = pathNode || null;
              if (!pathNode) return;
              const code = String(pathNode.getAttribute("id") || "").trim();
              const labelNode = labelByCountry.get(code);
              if (labelNode) {
                labelNode.classList.add("is-hover");
              }
              showCountryTrail(pathNode);
              pathNode.classList.add("is-lifted");
            }

            function clearLoadingCountry() {
              if (!loadingCountryCode) return;
              const currentLabel = labelByCountry.get(loadingCountryCode);
              if (currentLabel) {
                currentLabel.classList.remove("is-loading");
              }
              loadingCountryCode = "";
            }

            function setLoadingCountry(countryId) {
              const code = String(countryId || "").trim();
              if (!code) return;
              clearLoadingCountry();
              const labelNode = labelByCountry.get(code);
              if (!labelNode) return;
              labelNode.classList.add("is-loading");
              loadingCountryCode = code;
              window.setTimeout(() => {
                if (loadingCountryCode === code) {
                  clearLoadingCountry();
                }
              }, 4500);
            }

            ["RO", "AT", "CZ", "SE", "EE"].forEach((countryCode) => {
              const priorityPath = document.getElementById(countryCode);
              if (priorityPath) {
                bringCountryAbove(priorityPath);
              }
            });

            const norwayPath = document.getElementById("NO");
            const firstCountryPath = document.querySelector("path[id]");
            if (
              norwayPath &&
              firstCountryPath &&
              norwayPath.parentNode === firstCountryPath.parentNode &&
              norwayPath !== firstCountryPath
            ) {
              norwayPath.parentNode.insertBefore(norwayPath, firstCountryPath);
            }

            labels.forEach((label, labelIndex) => {
              const countryId = label.getAttribute("data-country");
              const countryPath = document.getElementById(countryId);
              if (!countryPath) return;
              labelByCountry.set(countryId, label);
              countryPath.classList.add("is-map-country");
              label.style.setProperty(
                "--pill-delay",
                `${(1.48 + labelIndex * 0.045).toFixed(3)}s`,
              );

              const box = countryPath.getBBox();
              const centerX = box.x + box.width / 2;
              const centerY = box.y + box.height / 2;
              label.style.setProperty("--tx", `${centerX.toFixed(1)}px`);
              label.style.setProperty("--ty", `${centerY.toFixed(1)}px`);

              const pillText = label.querySelector(".pill-text");
              const pillBg = label.querySelector(".pill-bg");
              if (pillText && pillBg) {
                const textBox = pillText.getBBox();
                const padX = 9;
                const padY = 3;
                const width = textBox.width + padX * 2;
                const height = textBox.height + padY * 2;
                pillBg.setAttribute("x", (-width / 2).toFixed(1));
                pillBg.setAttribute("y", (-height / 2).toFixed(1));
                pillBg.setAttribute("width", width.toFixed(1));
                pillBg.setAttribute("height", height.toFixed(1));
                pillBg.setAttribute("rx", (height / 2).toFixed(1));
                pillBg.setAttribute("ry", (height / 2).toFixed(1));

                const loaderGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
                loaderGroup.setAttribute("class", "country-label-loader");
                loaderGroup.setAttribute(
                  "transform",
                  `translate(${(width / 2 + 16).toFixed(1)} 0)`,
                );
                const loaderBg = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                loaderBg.setAttribute("class", "loader-bg");
                loaderBg.setAttribute("cx", "0");
                loaderBg.setAttribute("cy", "0");
                loaderBg.setAttribute("r", "7.5");
                const loaderRing = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                loaderRing.setAttribute("class", "loader-ring");
                loaderRing.setAttribute("cx", "0");
                loaderRing.setAttribute("cy", "0");
                loaderRing.setAttribute("r", "5.2");
                loaderGroup.appendChild(loaderBg);
                loaderGroup.appendChild(loaderRing);
                label.appendChild(loaderGroup);
              }

              countryPath.addEventListener("click", (event) => {
                event.stopPropagation();
                setLoadingCountry(countryId);
                setHoveredCountry(null);
                openParentModal(countryId);
              });
            });

            if (mapRoot) {
              mapRoot.addEventListener("pointermove", (event) => {
                const target = event.target;
                if (!(target instanceof Element)) return;
                const pathNode = target.closest("path[id].is-map-country");
                setHoveredCountry(pathNode || null);
              });
              mapRoot.addEventListener("mouseleave", () => {
                setHoveredCountry(null);
              });
            }

            window.addEventListener("blur", () => {
              setHoveredCountry(null);
            });

            requestAnimationFrame(sizeLegend);
            translateMapLegendIfNeeded();
            if (legendLogo) {
              legendLogo.addEventListener("click", (event) => {
                event.preventDefault();
                event.stopPropagation();
                window.parent.postMessage({ type: "ecva-open-app-hub" }, "*");
              });
              legendLogo.addEventListener("load", () => {
                requestAnimationFrame(sizeLegend);
              });
              if (legendLogo.complete) {
                requestAnimationFrame(sizeLegend);
              }
            }

            window.addEventListener("message", (event) => {
              if (!event || !event.data || typeof event.data !== "object") return;
              const type = String(event.data.type || "");
              const payload = event.data.payload || {};

              if (type === "ecva-request-active-countries") {
                window.parent.postMessage(
                  { type: "ecva-active-countries", payload: { countries: getActiveCountriesPayload() } },
                  "*",
                );
                return;
              }

              if (type === "ecva-request-country-modal-html") {
                const countryId = String(payload.countryId || "").trim();
                const requestId = String(payload.requestId || "").trim();
                if (!countryInfo[countryId]) return;
                window.parent.postMessage(
                  {
                    type: "ecva-country-modal-html",
                    payload: { countryId, requestId, html: renderModalHtml(countryId) },
                  },
                  "*",
                );
                return;
              }

              if (type === "ecva-country-open-complete") {
                clearLoadingCountry();
                return;
              }

              if (type === "ecva-editor-apply-state") {
                applyEditorState(payload.state);
                window.parent.postMessage(
                  { type: "ecva-editor-state-changed", payload: { state: getEditorStateSnapshot() } },
                  "*",
                );
                return;
              }

              if (type === "ecva-editor-update-entry") {
                const updated = updateEntryFromEditor(payload);
                if (!updated) return;
                window.parent.postMessage(
                  {
                    type: "ecva-editor-entry-updated",
                    payload: {
                      countryId: updated.countryId,
                      html: renderModalHtml(updated.countryId),
                    },
                  },
                  "*",
                );
                window.parent.postMessage(
                  { type: "ecva-editor-state-changed", payload: { state: getEditorStateSnapshot() } },
