<!DOCTYPE html><svg
  baseprofile="tiny"
  fill="#E5E5E5"
  height="684"
  stroke="black"
  stroke-linecap="round"
  stroke-linejoin="round"
  stroke-width=".1"
  version="1.2"
  viewBox="80 -8 1040 708"
  preserveAspectRatio="xMidYMid meet"
  width="100%"
  height="100%"
  xmlns="http://www.w3.org/2000/svg"
>
  <style>
    @keyframes mapReveal {
      0% {
        opacity: 0;
        transform: scale(0.985);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes legendDropIn {
      0% {
        opacity: 0;
        transform: translateY(-42px) scale(0.99);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes pillFadeIn {
      0% {
        opacity: 0;
        filter: blur(1.5px);
      }
      100% {
        opacity: 1;
        filter: blur(0);
      }
    }

    #map-frame {
      pointer-events: none;
      transform-origin: center;
      animation: mapReveal 0.74s cubic-bezier(0.22, 1, 0.36, 1) 0s both;
    }

    path {
      fill: #e6e6e6;
      stroke: #aeb8bd;
      stroke-width: 0.35;
      stroke-linejoin: round;
      stroke-linecap: round;
      paint-order: stroke fill;
      transform-origin: center;
    }

    path.is-map-country {
      vector-effect: non-scaling-stroke;
      filter: brightness(1) saturate(1);
      transition:
        fill 0.24s ease,
        stroke 0.24s ease,
        opacity 0.24s ease,
        filter 0.44s cubic-bezier(0.22, 0.61, 0.36, 1),
        stroke-width 0.44s cubic-bezier(0.22, 0.61, 0.36, 1),
        transform 0.44s cubic-bezier(0.22, 0.61, 0.36, 1);
      will-change: transform, filter, stroke-width;
      cursor: default;
    }

    path.is-map-country.is-status-leading {
      fill: #253a46 !important;
      stroke: #6f8894 !important;
      stroke-width: 1 !important;
      opacity: 1;
    }

    path.is-map-country.is-status-high_momentum {
      fill: #395563 !important;
      stroke: #6f8894 !important;
      stroke-width: 1 !important;
      opacity: 1;
    }

    path.is-map-country.is-status-development {
      fill: #537686 !important;
      stroke: #6f8894 !important;
      stroke-width: 3 !important;
      opacity: 1;
    }

    path.is-map-country.is-status-pending {
      fill: #537686 !important;
      stroke: #6f8894 !important;
      stroke-width: 2 !important;
      opacity: 0.42;
    }

    path.is-map-country.is-status-no_data {
      fill: #e6e6e6 !important;
      stroke: #aeb8bd !important;
      stroke-width: 0.35 !important;
      opacity: 1;
    }

    path.is-map-country.is-hover-enabled {
      cursor: pointer;
    }

    path.is-map-country.is-status-leading.is-hover-enabled:hover {
      fill: #1d2f39 !important;
    }

    path.is-map-country.is-status-high_momentum.is-hover-enabled:hover {
      fill: #395867 !important;
    }

    path.is-map-country.is-status-development.is-hover-enabled:hover {
      fill: #55798a !important;
    }

    path.is-map-country.is-lifted,
    path.is-map-country.is-lifted:hover {
      stroke: #9fb3bd !important;
    }

    .country-trail {
      pointer-events: none;
      fill: none;
      stroke: #9fb3bd;
      stroke-width: 2.8;
      vector-effect: non-scaling-stroke;
      stroke-linejoin: round;
      stroke-linecap: round;
      paint-order: stroke fill;
      opacity: 0;
      transform: translateY(0);
      transform-origin: center;
    }

    .country-trail.is-on {
      opacity: 1;
      transform: translateY(0);
    }

    .country-label {
      pointer-events: none;
      transform-origin: center;
      transition:
        transform 0.18s ease,
        filter 0.18s ease;
      transform: translate(var(--tx, 0px), var(--ty, 0px));
      opacity: 0;
      animation: pillFadeIn 0.44s ease var(--pill-delay, 1.05s) forwards;
    }

    .country-label.is-hover {
      filter: brightness(1.1);
      transform: translate(var(--tx, 0px), var(--ty, 0px)) scale(1.015);
    }

    .country-label.is-hidden {
      display: none;
    }

    .pending-country-hint {
      pointer-events: all;
      opacity: 0.92;
      animation: pillFadeIn 0.28s ease both;
      cursor: help;
    }

    .pending-country-hint .hint-bg {
      fill: rgba(242, 247, 249, 0.94);
      stroke: #6f8894;
      stroke-width: 1.8;
    }

    .pending-country-hint .hint-text {
      fill: #3a5461;
      font-family: "Alexandria", sans-serif;
      font-size: 12px;
      font-weight: 800;
      text-anchor: middle;
      dominant-baseline: middle;
      user-select: none;
    }

    .pending-country-tooltip {
      pointer-events: none;
      opacity: 0;
      transition: opacity 70ms linear;
    }

    .pending-country-tooltip.is-visible {
      opacity: 1;
    }

    .pending-country-tooltip .tooltip-bg {
      fill: rgba(38, 57, 68, 0.96);
      stroke: rgba(198, 214, 223, 0.58);
      stroke-width: 1.1;
    }

    .pending-country-tooltip .tooltip-text {
      fill: #f2f8fb;
      font-family: "Alexandria", sans-serif;
      font-size: 11px;
      font-weight: 700;
      text-anchor: middle;
      dominant-baseline: middle;
      user-select: none;
    }

    .country-label .pill-bg {
      fill: rgba(243, 247, 248, 0.95);
      stroke: #6f8894;
      stroke-width: 2;
    }

    .country-label .pill-text,
    .country-label .code {
      text-anchor: middle;
      font-family: "Alexandria", sans-serif;
      dominant-baseline: middle;
    }

    .country-label .flag {
      font-size: 18.75px;
      stroke: none;
      font-family:
        "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif;
    }

    .country-label .code {
      fill: #2a414c;
      font-weight: 700;
      font-size: 13.5px;
    }

    .country-label-loader {
      display: none;
      pointer-events: none;
    }

    .country-label.is-loading .country-label-loader {
      display: inline;
    }

    .country-label-loader .loader-bg {
      fill: rgba(243, 247, 248, 0.96);
      stroke: #6f8894;
      stroke-width: 1.2;
    }

    .country-label-loader .loader-ring {
      fill: none;
      stroke: #2f4a58;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-dasharray: 14 10;
      animation: countryPillLoaderDash 0.82s linear infinite;
    }

    @keyframes countryPillLoaderDash {
      to {
        stroke-dashoffset: -24;
      }
    }

    #map-legend {
      pointer-events: auto;
      opacity: 0;
      transform: translateY(-42px);
      animation: legendDropIn 0.98s cubic-bezier(0.22, 0.72, 0.2, 1) 0.78s
        forwards;
    }

    .legend-card {
      box-sizing: border-box;
      width: fit-content;
      height: auto;
      padding: 1px 24px;
      border-radius: 14px;
      border: 1px solid rgba(123, 147, 158, 0.6);
      background: linear-gradient(
        180deg,
        rgba(250, 251, 246, 0.98) 0%,
        rgba(246, 248, 242, 0.98) 100%
      );
      box-shadow: 0 10px 22px rgba(42, 65, 76, 0.08);
      backdrop-filter: blur(2px);
      font-family: "Alexandria", sans-serif;
      color: #2a414c;
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }

    .legend-logo {
      margin-top: 6px;
      width: 184px;
      height: 56px;
      display: block;
      object-fit: contain;
      transform: translateY(-1px);
      cursor: pointer;
    }

    .legend-meta {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .legend-title {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin: 0;
    }

    .legend-row {
      display: flex;
      gap: 14px;
      align-items: center;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .legend-swatch {
      width: 20px;
      height: 20px;
      border-radius: 44px;
      border: 1px solid rgba(42, 65, 76, 0.35);
      box-sizing: border-box;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 800;
      color: #ffffff;
      line-height: 1;
    }

    .legend-leading {
      background: #1d2f39;
    }

    .legend-development {
      background: #55798a;
    }

    .legend-momentum {
      background: #304a57;
    }
  </style>

              const value = String(rawStatus || "").trim().toLowerCase();
              if (value === "high_momentum" || value === "momentum" || value === "high momentum") {
                return "high_momentum";

              if (value === "in development" || value === "development" || value === "dev") {
                return "development";

              if (value === "pending") return "pending";
              if (value === "no_data" || value === "no data" || value === "nodata") return "no_data";
              return "no_data";

              const value = normalizeStatusValue(statusValue);
              if (value === "leading") return "Leading";

              if (value === "pending") return "Pending";

            function escapeHtml(value) {
              return String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
            }

            function formatItem(item) {
              if (!item) return "";
              const text = String(item).trim();
              if (text.includes(":")) {
                const idx = text.indexOf(":");
                const head = text.slice(0, idx).trim();
                const tail = text.slice(idx + 1).trim();
                if (head.length > 0 && tail.length > 0) {
                  return `<strong>${escapeHtml(head)}:</strong> ${escapeHtml(tail)}`;
                }
              }
              const words = text.split(/\s+/);
              if (words.length <= 3) return `<strong>${escapeHtml(text)}</strong>`;
              const lead = words.slice(0, 3).join(" ");
              const rest = words.slice(3).join(" ");
              return `<strong>${escapeHtml(lead)}</strong> ${escapeHtml(rest)}`;
            }

            function renderSection(title, items) {
              if (!items || !items.length) return "";
              const list = items
                .map((item) => `<li>${formatItem(item)}</li>`)
                .join("");
              const sectionClass =
                title === "Outlook" ? "country-modal-section outlook" : "country-modal-section";
              return `<section class="${sectionClass}"><h4>${escapeHtml(title)}</h4><ul>${list}</ul></section>`;
            }

                  ? pillarConfig.entries.filter((entry) => entry && typeof entry === "object")
                  : [];
                return {
                  active: Boolean(pillarConfig.active),
                  entries,
                };
              }
              const fallbackFlag =
                countryInfo[countryId] && countryInfo[countryId].flag
                  ? countryInfo[countryId].flag
                  : "🏳️";
              return {
                active: false,
                entries: [makeEntry(fallbackFlag)],
              };
            }

            function getFlagFromLanguageCode(languageCode) {
              const code = String(languageCode || "").trim().toLowerCase();
              if (!code) return "";
              const languageToCountry = {
                en: "GB",
                ro: "RO",
                de: "DE",
                fr: "FR",
                es: "ES",
                it: "IT",
                pt: "PT",
                nl: "NL",
                cs: "CZ",
                da: "DK",
                fi: "FI",
                sv: "SE",
                et: "EE",
                is: "IS",
                no: "NO",
                nb: "NO",
                nn: "NO",
                el: "GR",
                pl: "PL",
                hu: "HU",
                bg: "BG",
                hr: "HR",
                sk: "SK",
                sl: "SI",
                lt: "LT",
                lv: "LV",
              };
              const countryCode = languageToCountry[code] || code.toUpperCase();
              if (!/^[A-Z]{2}$/.test(countryCode)) return "";
              return String.fromCodePoint(
                ...countryCode
                  .split("")
                  .map((char) => 127397 + char.charCodeAt(0)),
              );
            }

            function getFlagFromLanguageLabel(languageLabel) {
              const raw = String(languageLabel || "").trim().toLowerCase();
              if (!raw) return "";
              const normalized = raw
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .replace(/\./g, "")
                .trim();
              const tokens = normalized.split(/\s+/).filter(Boolean);
              const text = tokens.join(" ");
              if (
                text.includes("english") ||
                text.includes("engleza")
              ) {
                return getFlagFromLanguageCode("en");
              }
              if (text.includes("romana") || text.includes("romanian")) {
                return getFlagFromLanguageCode("ro");
              }
              if (text.includes("francais") || text.includes("french")) {
                return getFlagFromLanguageCode("fr");
              }
              if (text.includes("deutsch") || text.includes("german")) {
                return getFlagFromLanguageCode("de");
              }
              if (text.includes("espanol") || text.includes("spanish")) {
                return getFlagFromLanguageCode("es");
              }
              if (/^[a-z]{2}$/.test(text)) {
                return getFlagFromLanguageCode(text);
              }
              return "";
            }

            function getEntryLanguageFlags(entry) {
              if (!entry || typeof entry !== "object") return [];
              const langsRaw = Array.isArray(entry.languages) ? entry.languages : [];
              const resourceLangFlags = Array.isArray(entry.resourceLanguages)
                ? entry.resourceLanguages
                    .map((item) => {
                      if (!item || typeof item !== "object") return "";
                      const explicitFlag = String(item.languageFlag || "").trim();
                      if (explicitFlag) return explicitFlag;
                      const byCode = getFlagFromLanguageCode(item.languageCode);
                      if (byCode) return byCode;
                      return getFlagFromLanguageLabel(item.languageLabel);
                    })
                    .filter(Boolean)
                : [];
              const availabilityFlags = String(entry.languageAvailability || "")
                .split(",")
                .map((part) => getFlagFromLanguageLabel(part))
                .filter(Boolean);
              return [
                ...new Set(
                  langsRaw
                    .concat(resourceLangFlags)
                    .concat(availabilityFlags)
                    .map((lang) => String(lang || "").trim())
                    .filter(Boolean),
                ),
              ];
            }

            function getLanguageCounts(entries) {
              const counts = new Map();
              entries.forEach((entry) => {
                const uniqueLangs = getEntryLanguageFlags(entry);
                uniqueLangs.forEach((lang) => {
                  counts.set(lang, (counts.get(lang) || 0) + 1);
                });
              });
              return Array.from(counts.entries());

            function renderPillarDetailCards(countryId) {
              function normalizeResourceDeliveryUrl(url, accessType, fileName) {
                const value = String(url || "").trim();
                if (!value) return "";
                const isFile =
                  String(accessType || "").trim().toLowerCase() === "file";
                const name = String(fileName || "").trim().toLowerCase();
                const looksLikeDoc =
                  isFile &&
                  (/\.(pdf|doc|docx|ppt|pptx)$/i.test(value) ||
                    /\.(pdf|doc|docx|ppt|pptx)$/i.test(name));
                if (
                  looksLikeDoc &&
                  value.includes("res.cloudinary.com/") &&
                  value.includes("/image/upload/")
                ) {
                  return value.replace("/image/upload/", "/raw/upload/");
                }
                return value;
              }
              function inferResourceTypeLabel(item) {
                const resourceType = String(
                  (item && item.resourceType) || "",
                )
                  .trim()
                  .toLowerCase();
                if (resourceType === "image") return "Image";
                if (resourceType === "youtube") return "Youtube";
                if (resourceType === "webpage") return "Webpage";
                if (resourceType === "document") return "Document";
                const explicit = String(
                  (item && item.resourceTypeLabel) || "",
                ).trim();
                if (explicit && !/^document$/i.test(explicit)) return explicit;
                const accessType = String((item && item.accessType) || "")
                  .trim()
                  .toLowerCase();
                if (accessType === "url") return "Webpage";
                const probe = `${String((item && item.fileName) || "")} ${String(
                  (item && item.resourceUrl) || "",
                )}`.toLowerCase();
                if (/\.(png|jpe?g|gif|webp|svg)(\?|#|$)/i.test(probe)) {
                  return "Image";
                }
                if (/\.(pdf|docx?|pptx?)(\?|#|$)/i.test(probe)) {
                  return "Document";

                if (/youtube\.com|youtu\.be/.test(probe)) {

                return explicit || (accessType === "file" ? "File" : "Webpage");

                        .map(
                          ([flag, count]) =>
                            `<span class="country-modal-pillar-dot-item"><strong>${count}</strong><span>${escapeHtml(flag)}</span></span>`,
                        )
                        .join("")}
                    </span>
                    `
                    : `
                    <span class="country-modal-pillar-symbol" aria-hidden="true"><img src="${escapeHtml(symbolIcon)}" alt="" loading="eager" decoding="async" /></span>
                    `;
                  return `
                  <article class="country-modal-pillar ${config.active ? "is-active" : "is-unavailable"} ${escapeHtml(pillarThemeClass)}">
                    <span class="country-modal-pillar-dot">${dotTextHtml}</span>
                    <strong class="country-modal-pillar-label">${escapeHtml(pillar.bottom)}</strong>
                  </article>
                `;
                })
                .join("");
            }

            function renderModalHtml(countryId) {
              const info = ensureCountryData(countryId);
              if (!info) return "";
              return `
                <div class="country-modal-header">
                  <div class="country-modal-top">
                    <div class="country-modal-identity">
                      <span class="country-modal-hero-flag">${escapeHtml(info.flag)}</span>
                      <span class="country-modal-hero-name">${escapeHtml(info.name)}</span>
                      <span class="country-modal-hero-status">(${escapeHtml(getStatusLabel(countryStatus[countryId]))})</span>
                    </div>
                    <div class="country-modal-pillars">
                      ${renderPillarItems(countryId)}
                    </div>
                  </div>
                  <div class="country-modal-outlook-inline">
                    ${renderOutlookPanel(countryId, info)}
                  </div>
                </div>
                <div class="country-modal-grid">
                  ${renderPillarDetailCards(countryId)}
                </div>
              `;
            }

            function openParentModal(countryId) {
              ensureCountryData(countryId);
              window.parent.postMessage(
                {
                  type: "ecva-scroll-parent-top",
                },
                "*",
              );
              window.parent.postMessage(
                {
                  type: "ecva-open-country-modal",
                  payload: {
                    countryId,
                    html: renderModalHtml(countryId),
                  },
                },
                "*",
              );
            }

            function buildCountryPayload(code) {
              const normalizedCode = String(code || "").trim().toUpperCase();
              if (!normalizedCode) return null;
              const pathNode = document.getElementById(normalizedCode);
              if (!pathNode) return null;
              const info = ensureCountryData(normalizedCode) || {};
              const statusValue = normalizeStatusValue(countryStatus[normalizedCode] || "no_data");
              const pillarIds = ["resources", "events", "research", "organisations", "government"];
              const pillarSummary = pillarIds.reduce((acc, pillarId) => {
                const config = getPillarConfig(normalizedCode, pillarId);
                const entries = Array.isArray(config.entries) ? config.entries : [];
                const visibleEntries = entries.filter((entry) => hasRenderableEntryContent(entry));
                const isActive = Boolean(config.active) && visibleEntries.length > 0;
                acc[pillarId] = {
                  active: isActive,
                  count: isActive ? visibleEntries.length : 0,
                };
                return acc;
              }, {});
              return {
                code: normalizedCode,
                name: String(info.name || pathNode.getAttribute("name") || normalizedCode),
                flag: String(info.flag || toFlagEmoji(normalizedCode)),
                status: getStatusLabel(statusValue),
                statusValue,
                accessCode: String(countryAccessCodesByCountry[normalizedCode] || "").trim().toLowerCase(),
                pillarSummary,
              };
            }

            function getAllCountriesPayload() {
              const codes = Array.from(
                new Set(
                  Array.from(document.querySelectorAll("path[id][name]"))
                    .map((node) => String(node.getAttribute("id") || "").trim().toUpperCase())
                    .filter(Boolean),
                ),
              );
              return codes.map((code) => buildCountryPayload(code)).filter(Boolean);
            }

            function getActiveCountriesPayload() {
              return getAllCountriesPayload().filter(
                (country) => isStatusActive(country.statusValue),
              );
            }

            function getCountryInboxPayload(countryId) {
              const code = String(countryId || "").trim().toUpperCase();
              if (!code) return [];
              return JSON.parse(JSON.stringify(getCountryInbox(code)));
            }

            function normalizeLangKey(rawLang) {
              const value = String(rawLang || "").trim().toLowerCase();
              if (!/^[a-z]{2}(?:-[a-z]{2})?$/.test(value)) return "en";
              return value.slice(0, 2);
            }

            function getLabelOverridesPayload(rawLang) {
              const lang = normalizeLangKey(rawLang);
              const source =
                uiLabelOverridesByLang[lang] &&
                typeof uiLabelOverridesByLang[lang] === "object"
                  ? uiLabelOverridesByLang[lang]
                  : {};
              const payload = {};
              Object.entries(source).forEach(([key, value]) => {
                const normalizedKey = String(key || "").trim();
                if (!normalizedKey) return;
                payload[normalizedKey] = String(value || "").trim();
              });
              return payload;
            }

            function getEditorStateSnapshot() {
              const snapshot = JSON.parse(JSON.stringify(pillarConfigByCountry));
              snapshot.__representatives = JSON.parse(JSON.stringify(representativesByCountry));
              snapshot.__countryStatus = JSON.parse(JSON.stringify(countryStatus));
              snapshot.__countryInbox = JSON.parse(JSON.stringify(countryInboxByCountry));
              snapshot.__accessCodes = JSON.parse(JSON.stringify(countryAccessCodesByCountry));
              snapshot.__uiLabelOverrides = JSON.parse(JSON.stringify(uiLabelOverridesByLang));
              snapshot.__meta = { ...EDITOR_STATE_META };
              return snapshot;
            }

            function applyEditorState(nextState) {
              if (!nextState || typeof nextState !== "object") return;
              const nextMeta =
                nextState.__meta && typeof nextState.__meta === "object"
                  ? nextState.__meta
                  : {};
              const storedInboxSchemaVersion = Number(nextMeta.inboxSchemaVersion || 0);
              const countryStatusState =
                nextState.__countryStatus && typeof nextState.__countryStatus === "object"
                  ? nextState.__countryStatus
                  : null;
              if (countryStatusState) {
                Object.entries(countryStatusState).forEach(([countryId, statusValue]) => {
                  const normalizedCountry = String(countryId || "").trim().toUpperCase();
                  if (!normalizedCountry || !document.getElementById(normalizedCountry)) return;
                  countryStatus[normalizedCountry] = normalizeStatusValue(statusValue);
                });
              }
              const representativeState =
                nextState.__representatives && typeof nextState.__representatives === "object"
                  ? nextState.__representatives
                  : null;
              if (representativeState) {
                Object.entries(representativeState).forEach(([countryId, reps]) => {
                  if (!Array.isArray(reps)) return;
                  representativesByCountry[countryId] = reps
                    .filter((rep) => rep && typeof rep === "object")
                    .map((rep) => ({
                      image: String(rep.image || "").trim(),
                      sourceImage: String(rep.sourceImage || rep.image || "").trim(),
                      name: String(rep.name || "").trim(),
                      title: String(rep.title || "").trim(),
                      organisation: String(rep.organisation || "").trim(),
                      crop:
                        rep.crop && typeof rep.crop === "object"
                          ? {
                              x: Number(rep.crop.x),
                              y: Number(rep.crop.y),
                              w: Number(rep.crop.w),
                              h: Number(rep.crop.h),
                            }
                          : undefined,
                    }));
                });
              }

              const inboxState =
                nextState.__countryInbox && typeof nextState.__countryInbox === "object"
                  ? nextState.__countryInbox
                  : null;
              const accessCodesState =
                nextState.__accessCodes && typeof nextState.__accessCodes === "object"
                  ? nextState.__accessCodes
                  : null;
              const uiLabelOverridesState =
                nextState.__uiLabelOverrides &&
                typeof nextState.__uiLabelOverrides === "object"
                  ? nextState.__uiLabelOverrides
                  : null;
              if (storedInboxSchemaVersion < EDITOR_STATE_META.inboxSchemaVersion) {
                Object.keys(countryInboxByCountry).forEach((countryId) => {
                  delete countryInboxByCountry[countryId];
                });
              } else if (inboxState) {
                Object.keys(countryInboxByCountry).forEach((countryId) => {
                  delete countryInboxByCountry[countryId];
                });
                Object.entries(inboxState).forEach(([countryId, items]) => {
                  const code = String(countryId || "").trim().toUpperCase();
                  if (!code || !Array.isArray(items)) return;
                  countryInboxByCountry[code] = items
                    .map((item) => normalizeSubmissionRecord(code, item))
                    .filter(Boolean);
                });
              }
              if (accessCodesState) {
                Object.keys(countryAccessCodesByCountry).forEach((countryId) => {
                  delete countryAccessCodesByCountry[countryId];
                });
                Object.entries(accessCodesState).forEach(([countryId, code]) => {
                  const normalizedCountry = String(countryId || "").trim().toUpperCase();
                  if (!normalizedCountry || !document.getElementById(normalizedCountry)) return;
                  const normalizedCode = String(code || "").trim().toLowerCase();
                  if (!normalizedCode) return;
                  countryAccessCodesByCountry[normalizedCountry] = normalizedCode;
                });
              }
              if (uiLabelOverridesState) {
                Object.keys(uiLabelOverridesByLang).forEach((lang) => {
                  delete uiLabelOverridesByLang[lang];
                });
                Object.entries(uiLabelOverridesState).forEach(([lang, labels]) => {
                  const normalizedLang = normalizeLangKey(lang);
                  if (!labels || typeof labels !== "object") return;
                  uiLabelOverridesByLang[normalizedLang] = {};
                  Object.entries(labels).forEach(([key, value]) => {
                    const normalizedKey = String(key || "").trim();
                    if (!normalizedKey) return;
                    uiLabelOverridesByLang[normalizedLang][normalizedKey] = String(value || "").trim();
                  });
                });
              }

              Object.entries(nextState).forEach(([countryId, countryValue]) => {
                if (countryId.startsWith("__")) return;
                if (!countryValue || typeof countryValue !== "object") return;
                if (!pillarConfigByCountry[countryId] || typeof pillarConfigByCountry[countryId] !== "object") {
                  pillarConfigByCountry[countryId] = {};
                }
                Object.entries(countryValue).forEach(([pillarId, pillarValue]) => {
                  if (!pillarValue || typeof pillarValue !== "object") return;
                  const target = pillarConfigByCountry[countryId][pillarId];
                  if (!target || typeof target !== "object") {
                    pillarConfigByCountry[countryId][pillarId] = {};
                  }
                  if (typeof pillarValue.active === "boolean") {
                    pillarConfigByCountry[countryId][pillarId].active = pillarValue.active;
                  }
                  if (Array.isArray(pillarValue.entries)) {
                    pillarConfigByCountry[countryId][pillarId].entries = pillarValue.entries.map((entry) =>
                      entry && typeof entry === "object" ? { ...entry } : entry,
                    );
                  }
                });
              });
              applyAllCountryStatuses();
            }

            function normalizeSubmissionStatus(rawStatus) {
              const value = String(rawStatus || "").trim().toLowerCase();
              if (value === "pending") return "pending";
              if (value === "in_progress" || value === "in progress" || value === "processing")
                return "pending";
              if (value === "rejected" || value === "declined") return "pending";
              if (value === "archived" || value === "done" || value === "used") return "archived";
              return "new";
            }

            function getCountryInbox(countryId) {
              const code = String(countryId || "").trim().toUpperCase();
              if (!code) return [];
              if (!Array.isArray(countryInboxByCountry[code])) {
                countryInboxByCountry[code] = [];
              }
              return countryInboxByCountry[code];
            }

            function normalizeSubmissionRecord(countryId, rawSubmission) {
              const code = String(countryId || "").trim().toUpperCase();
              if (!code || !rawSubmission || typeof rawSubmission !== "object") return null;
              const mode =
                String(rawSubmission.type || "").trim().toLowerCase() === "representative"
                  ? "representative"
                  : "article";
              const translationRequired = mode === "article" && code !== "GB";
              const legacyRepresentativeName = String(
                rawSubmission.representativeName || rawSubmission.name || "",
              ).trim();
              const legacyRepresentativeTitle = String(
                rawSubmission.representativeTitle || rawSubmission.role || "",
              ).trim();
              const legacyRepresentativeOrganisation = String(
                rawSubmission.organisation || rawSubmission.organization || "",
              ).trim();
              const submittedBy =
                rawSubmission.submittedBy && typeof rawSubmission.submittedBy === "object"
                  ? {
                      name: String(rawSubmission.submittedBy.name || "").trim(),
                      email: String(rawSubmission.submittedBy.email || "").trim(),
                    }
                  : { name: "", email: "" };
              const representativeContact =
                rawSubmission.representativeContact &&
                typeof rawSubmission.representativeContact === "object"
                  ? {
                      name: String(rawSubmission.representativeContact.name || "").trim(),
                      role: String(rawSubmission.representativeContact.role || "").trim(),
                      email: String(rawSubmission.representativeContact.email || "").trim(),
                    }
                  : { name: "", role: "", email: "" };
              const links = Array.isArray(rawSubmission.links)
                ? rawSubmission.links
                    .map((item) => String(item || "").trim())
                    .filter(Boolean)
                : [];
              const attachments = Array.isArray(rawSubmission.attachments)
                ? rawSubmission.attachments
                    .filter((item) => item && typeof item === "object")
                    .map((item) => ({
                      name: String(item.name || "").trim(),
                      url: String(item.url || "").trim(),
                    }))
                    .filter((item) => item.name || item.url)
                : [];
              const resourceLanguages = Array.isArray(rawSubmission.resourceLanguages)
                ? rawSubmission.resourceLanguages
                    .filter((item) => item && typeof item === "object")
                    .map((item) => ({
                      languageCode: String(item.languageCode || "").trim().toLowerCase(),
                      languageLabel: String(item.languageLabel || "").trim(),
                      languageFlag: String(item.languageFlag || "").trim(),
                      resourceType: String(item.resourceType || "").trim().toLowerCase(),
                      resourceTypeLabel: String(item.resourceTypeLabel || "").trim(),
                      resourcePricing: String(item.resourcePricing || "free")
                        .trim()
                        .toLowerCase(),
                      resourcePricingLabel: String(item.resourcePricingLabel || "").trim(),
                      accessType: String(item.accessType || "url").trim().toLowerCase() === "file" ? "file" : "url",
                      resourceUrl: String(item.resourceUrl || "").trim(),
                      fileName: String(item.fileName || "").trim(),
                    }))
                    .filter((item) => item.languageCode && item.resourceUrl)
                : [];
              const ownership =
                rawSubmission.ownership &&
                typeof rawSubmission.ownership === "object"
                  ? {
                      type: String(rawSubmission.ownership.type || "").trim(),
                      name: String(rawSubmission.ownership.name || "").trim(),
                    }
                  : { type: "", name: "" };
              const representativeDraft =
                rawSubmission.representativeDraft &&
                typeof rawSubmission.representativeDraft === "object"
                  ? {
                      name: String(rawSubmission.representativeDraft.name || "").trim(),
                      title: String(rawSubmission.representativeDraft.title || "").trim(),
                      organisation: String(
                        rawSubmission.representativeDraft.organisation || "",
                      ).trim(),
                      image: String(rawSubmission.representativeDraft.image || "").trim(),
                      sourceImage: String(
                        rawSubmission.representativeDraft.sourceImage || "",
                      ).trim(),
                      crop:
                        rawSubmission.representativeDraft.crop &&
                        typeof rawSubmission.representativeDraft.crop === "object"
                          ? {
                              x: Number(rawSubmission.representativeDraft.crop.x),
                              y: Number(rawSubmission.representativeDraft.crop.y),
                              w: Number(rawSubmission.representativeDraft.crop.w),
                              h: Number(rawSubmission.representativeDraft.crop.h),
                            }
                          : null,
                    }
                  : legacyRepresentativeName ||
                      legacyRepresentativeTitle ||
                      legacyRepresentativeOrganisation
                    ? {
                        name: legacyRepresentativeName,
                        title: legacyRepresentativeTitle,
                        organisation: legacyRepresentativeOrganisation,
                        image: String(rawSubmission.image || "").trim(),
                        sourceImage: String(
                          rawSubmission.sourceImage || rawSubmission.image || "",
                        ).trim(),
                        crop:
                          rawSubmission.crop && typeof rawSubmission.crop === "object"
                            ? {
                                x: Number(rawSubmission.crop.x),
                                y: Number(rawSubmission.crop.y),
                                w: Number(rawSubmission.crop.w),
                                h: Number(rawSubmission.crop.h),
                              }
                            : null,
                      }
                    : null;
              const nativeTitle =
                String(rawSubmission.nativeTitle || rawSubmission.title || "").trim() ||
                legacyRepresentativeName;
              const nativeDescription =
                String(rawSubmission.nativeDescription || rawSubmission.description || "").trim() ||
                [legacyRepresentativeTitle, legacyRepresentativeOrganisation]
                  .filter(Boolean)
                  .join(" • ");
              const translationChecked = translationRequired
                ? Boolean(rawSubmission.translationChecked)
                : true;
              const englishTitleRaw = String(rawSubmission.englishTitle || "").trim();
              const englishDescriptionRaw = String(
                rawSubmission.englishDescription || "",
              ).trim();
              const englishTitle = translationRequired
                ? englishTitleRaw
                : englishTitleRaw || nativeTitle;
              const englishDescription = translationRequired
                ? englishDescriptionRaw
                : englishDescriptionRaw || nativeDescription;
              return {
                id:
                  String(rawSubmission.id || "").trim() ||
                  `${code}-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
                countryId: code,
                type: mode,
                status: normalizeSubmissionStatus(rawSubmission.status),
                pillarId: String(rawSubmission.pillarId || "").trim().toLowerCase(),
                pillarLabel: String(rawSubmission.pillarLabel || "").trim(),
                title: nativeTitle,
                nativeTitle,
                englishTitle,
                subtitle: String(rawSubmission.subtitle || "").trim(),
                description: nativeDescription,
                nativeDescription,
                englishDescription,
                translationChecked,
                translationSourceTitle: String(
                  rawSubmission.translationSourceTitle || "",
                ).trim(),
                translationSourceDescription: String(
                  rawSubmission.translationSourceDescription || "",
                ).trim(),
                translationCheckedAt: String(rawSubmission.translationCheckedAt || "").trim(),
                languageAvailability: String(rawSubmission.languageAvailability || "").trim(),
                ownership,
                links,
                attachments,
                resourceLanguages,
                submittedBy,
                representativeContact,
                representativeDraft,
                createdAt:
                  String(rawSubmission.createdAt || "").trim() ||
                  new Date().toISOString(),
                updatedAt:
                  String(rawSubmission.updatedAt || "").trim() ||
                  new Date().toISOString(),
              };
            }

            function addSubmissionFromFrontend(payload) {
              if (!payload || typeof payload !== "object") return null;
              const countryId = String(payload.countryId || "").trim().toUpperCase();
              if (!countryId || !document.getElementById(countryId)) return null;
              ensureCountryData(countryId);
              const submission = normalizeSubmissionRecord(countryId, payload.submission);
              if (!submission) return null;
              const inbox = getCountryInbox(countryId);
              inbox.unshift(submission);
              return { countryId, submissionId: submission.id };
            }

            function updateSubmissionStatusFromEditor(payload) {
              if (!payload || typeof payload !== "object") return null;
              const countryId = String(payload.countryId || "").trim().toUpperCase();
              const submissionId = String(payload.submissionId || "").trim();
              if (!countryId || !submissionId) return null;
              const inbox = getCountryInbox(countryId);
              const record = inbox.find((item) => String(item && item.id || "") === submissionId);
              if (!record) return null;
              record.status = normalizeSubmissionStatus(payload.status);
              record.updatedAt = new Date().toISOString();
              return { countryId, submissionId };
            }

            function updateAccessCodeFromEditor(payload) {
              if (!payload || typeof payload !== "object") return null;
              const countryId = String(payload.countryId || "").trim().toUpperCase();
              const accessCode = String(payload.accessCode || "").trim().toLowerCase();
              if (!countryId || !accessCode) return null;
              if (!document.getElementById(countryId)) return null;
              countryAccessCodesByCountry[countryId] = accessCode;
              return { countryId, accessCode };
            }

            function updateLabelOverridesFromEditor(payload) {
              if (!payload || typeof payload !== "object") return null;
              const lang = normalizeLangKey(payload.lang);
              const labels =
                payload.labels && typeof payload.labels === "object"
                  ? payload.labels
                  : {};
              const nextLabels = {};
              Object.entries(labels).forEach(([key, value]) => {
                const normalizedKey = String(key || "").trim();
                if (!normalizedKey) return;
                const normalizedValue = String(value || "").trim();
                if (!normalizedValue) return;
                nextLabels[normalizedKey] = normalizedValue;
              });
              uiLabelOverridesByLang[lang] = nextLabels;
              return { lang, labels: nextLabels };
            }

            function updateSubmissionFromEditor(payload) {
              if (!payload || typeof payload !== "object") return null;
              const countryId = String(payload.countryId || "").trim().toUpperCase();
              const submissionId = String(payload.submissionId || "").trim();
              const fields =
                payload.fields && typeof payload.fields === "object" ? payload.fields : {};
              if (!countryId || !submissionId) return null;
              const inbox = getCountryInbox(countryId);
              const record = inbox.find(
                (item) => String((item && item.id) || "") === submissionId,
              );
              if (!record) return null;
              if (typeof fields.title === "string") {
                record.title = String(fields.title || "").trim();
                record.nativeTitle = record.title;
              }
              if (typeof fields.description === "string") {
                record.description = String(fields.description || "").trim();
                record.nativeDescription = record.description;
              }
              if (typeof fields.nativeTitle === "string") {
                record.nativeTitle = String(fields.nativeTitle || "").trim();
                record.title = record.nativeTitle;
              }
              if (typeof fields.nativeDescription === "string") {
                record.nativeDescription = String(fields.nativeDescription || "").trim();
                record.description = record.nativeDescription;
              }
              if (typeof fields.englishTitle === "string") {
                record.englishTitle = String(fields.englishTitle || "").trim();
              }
              if (typeof fields.englishDescription === "string") {
                record.englishDescription = String(fields.englishDescription || "").trim();
              }
              if (typeof fields.translationChecked === "boolean") {
                record.translationChecked = Boolean(fields.translationChecked);
              }
              if (typeof fields.translationSourceTitle === "string") {
                record.translationSourceTitle = String(
                  fields.translationSourceTitle || "",
                ).trim();
              }
              if (typeof fields.translationSourceDescription === "string") {
                record.translationSourceDescription = String(
                  fields.translationSourceDescription || "",
                ).trim();
              }
              if (typeof fields.translationCheckedAt === "string") {
                record.translationCheckedAt = String(fields.translationCheckedAt || "").trim();
              }
              if (typeof fields.subtitle === "string") {
                record.subtitle = String(fields.subtitle || "").trim();
              }
              if (typeof fields.languageAvailability === "string") {
                record.languageAvailability = String(fields.languageAvailability || "").trim();
              }
              if (Array.isArray(fields.links)) {
                record.links = fields.links
                  .map((next) => String(next || "").trim())
                  .filter(Boolean);
              }
              if (Array.isArray(fields.resourceLanguages)) {
                record.resourceLanguages = fields.resourceLanguages
                  .filter((item) => item && typeof item === "object")
                  .map((item) => ({
                    languageCode: String(item.languageCode || "").trim().toLowerCase(),
                    languageLabel: String(item.languageLabel || "").trim(),
                    languageFlag: String(item.languageFlag || "").trim(),
                    resourceType: String(item.resourceType || "").trim().toLowerCase(),
                    resourceTypeLabel: String(item.resourceTypeLabel || "").trim(),
                    resourcePricing: String(item.resourcePricing || "free")
                      .trim()
                      .toLowerCase(),
                    resourcePricingLabel: String(item.resourcePricingLabel || "").trim(),
                    accessType:
                      String(item.accessType || "url").trim().toLowerCase() === "file"
                        ? "file"
                        : "url",
                    resourceUrl: String(item.resourceUrl || "").trim(),
                    fileName: String(item.fileName || "").trim(),
                  }))
                  .filter((item) => item.languageCode && item.resourceUrl);
              }
              if (fields.ownership && typeof fields.ownership === "object") {
                record.ownership = {
                  type: String(fields.ownership.type || "").trim(),
                  name: String(fields.ownership.name || "").trim(),
                };
              }
              if (
                fields.representativeContact &&
                typeof fields.representativeContact === "object"
              ) {
                record.representativeContact = {
                  name: String(fields.representativeContact.name || "").trim(),
                  role: String(fields.representativeContact.role || "").trim(),
                  email: String(fields.representativeContact.email || "").trim(),
                };
              }
              if (
                fields.representativeDraft &&
                typeof fields.representativeDraft === "object"
              ) {
                const draft = fields.representativeDraft;
                const crop =
                  draft.crop && typeof draft.crop === "object"
                    ? {
                        x: Number(draft.crop.x),
                        y: Number(draft.crop.y),
                        w: Number(draft.crop.w),
                        h: Number(draft.crop.h),
                      }
                    : null;
                record.representativeDraft = {
                  name: String(draft.name || "").trim(),
                  title: String(draft.title || "").trim(),
                  organisation: String(draft.organisation || "").trim(),
                  image: String(draft.image || "").trim(),
                  sourceImage: String(draft.sourceImage || draft.image || "").trim(),
                  crop:
                    crop &&
                    Number.isFinite(crop.x) &&
                    Number.isFinite(crop.y) &&
                    Number.isFinite(crop.w) &&
                    Number.isFinite(crop.h)
                      ? crop
                      : null,
                };
              }
              if (String(record.type || "").trim().toLowerCase() === "article") {
                if (countryId === "GB") {
                  record.translationChecked = true;
                  record.englishTitle = String(record.englishTitle || record.nativeTitle || record.title || "").trim();
                  record.englishDescription = String(
                    record.englishDescription ||
                      record.nativeDescription ||
                      record.description ||
                      "",
                  ).trim();
                } else if (!record.translationChecked) {

            function hidePendingCountryTooltip() {

            function setPendingTooltipLines(textValue) {
              if (!pendingTooltipText || !pendingTooltipRect) return;
              const words = String(textValue || "").trim().split(/\s+/).filter(Boolean);
              const lines = [];
              let current = "";
              words.forEach((word) => {
                const candidate = current ? `${current} ${word}` : word;
                if (candidate.length <= 52) {
                  current = candidate;
                } else {
                  if (current) lines.push(current);
                  current = word;
                }
              });
              if (current) lines.push(current);
              const safeLines = lines.length ? lines.slice(0, 2) : [textValue];
              if (lines.length > 2) {
                safeLines[1] = `${safeLines[1].replace(/\s+$/, "")}...`;
              }
              pendingTooltipText.textContent = "";
              safeLines.forEach((line, index) => {
                const tspan = document.createElementNS("http://www.w3.org/2000/svg", "tspan");
                tspan.textContent = line;
                tspan.setAttribute("x", "0");
                tspan.setAttribute("dy", index === 0 ? "0" : "1.22em");
                pendingTooltipText.appendChild(tspan);
              });

              const width = 352;
              const lineCount = safeLines.length;
              const height = lineCount > 1 ? 43 : 30;
              pendingTooltipRect.setAttribute("x", String(-width / 2));
              pendingTooltipRect.setAttribute("y", String(-height / 2));
              pendingTooltipRect.setAttribute("width", String(width));
              pendingTooltipRect.setAttribute("height", String(height));
              pendingTooltipRect.setAttribute("rx", "9");
              pendingTooltipRect.setAttribute("ry", "9");
              pendingTooltipText.setAttribute("y", lineCount > 1 ? "-7.5" : "0");
            }

              const info = ensureCountryData(code);
              const pathNode = pathByCountry.get(code) || document.getElementById(code);
              if (!info || !pathNode) return;
              const tooltipNode = ensurePendingTooltipNode();
              if (!tooltipNode || !pendingTooltipRect || !pendingTooltipText) return;

              const textValue = `${info.name} is preparing to enter the ECVA family and new information will be available soon!`;
              setPendingTooltipLines(textValue);

              const box = pathNode.getBBox();
              const centerX = box.x + box.width / 2;
              let tooltipY = box.y - 12;
              if (tooltipY < 26) {
                tooltipY = box.y + box.height + 16;
              }
              const minX = frameBox.x + 182;
              const maxX = frameBox.x + frameBox.width - 182;
              const clampedX = Math.max(minX, Math.min(maxX, centerX));
              tooltipNode.setAttribute(
                "transform",
                `translate(${clampedX.toFixed(1)} ${tooltipY.toFixed(1)})`,
              );
              pendingTooltipCountry = code;
              tooltipNode.classList.add("is-visible");

                text.setAttribute("class", "hint-text");
                text.setAttribute("x", "0");
                text.setAttribute("y", "0");
                text.textContent = "?";

                marker.appendChild(circle);
                marker.appendChild(text);
                layer.appendChild(marker);
                pendingHintByCountry.set(code, marker);
              }
              marker.setAttribute(
                "transform",
                `translate(${centerX.toFixed(1)} ${centerY.toFixed(1)})`,
              );
              const tipText = `${info.name} is preparing to enter the ECVA family and new information will be available soon!`;
              marker.setAttribute("aria-label", tipText);
              marker.setAttribute("tabindex", "0");
              if (marker.dataset.tooltipWired !== "1") {
                marker.dataset.tooltipWired = "1";
                marker.addEventListener("mouseenter", () => {
                  showPendingCountryTooltip(code);
                });
                marker.addEventListener("mousemove", () => {
                  showPendingCountryTooltip(code);
                });
                marker.addEventListener("mouseleave", () => {
                  hidePendingCountryTooltip();
                });
                marker.addEventListener("focus", () => {
                  showPendingCountryTooltip(code);
                });
                marker.addEventListener("blur", () => {
                  hidePendingCountryTooltip();
                });
              }

              if (pathNode.dataset.pendingTooltipWired !== "1") {
                pathNode.dataset.pendingTooltipWired = "1";
                pathNode.addEventListener("mouseenter", () => {
                  if (pathNode.classList.contains("is-status-pending")) {
                    showPendingCountryTooltip(code);
                  }
                });
                pathNode.addEventListener("mousemove", () => {
                  if (pathNode.classList.contains("is-status-pending")) {
                    showPendingCountryTooltip(code);
                  }
                });
                pathNode.addEventListener("mouseleave", () => {
                  if (pendingTooltipCountry === code) {
                    hidePendingCountryTooltip();
                  }
                });
              }
            }

            function createCountryLabel(countryId) {
              const code = String(countryId || "").trim().toUpperCase();
              if (!code || !labelsLayer) return null;
              const existing = labelByCountry.get(code);
              if (existing) return existing;
              const info = ensureCountryData(code);
              if (!info) return null;
              const label = document.createElementNS("http://www.w3.org/2000/svg", "g");
              label.setAttribute("class", "country-label");
              label.setAttribute("data-country", code);

              const bg = document.createElementNS("http://www.w3.org/2000/svg", "rect");
              bg.setAttribute("class", "pill-bg");

              const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
              text.setAttribute("class", "pill-text");
              text.setAttribute("x", "0");
              text.setAttribute("y", "0");

              const flag = document.createElementNS("http://www.w3.org/2000/svg", "tspan");
              flag.setAttribute("class", "flag");
              flag.textContent = info.flag || toFlagEmoji(code) || "🏳️";

              const codeNode = document.createElementNS("http://www.w3.org/2000/svg", "tspan");
              codeNode.setAttribute("class", "code");
              codeNode.setAttribute("dx", "0");
              codeNode.textContent = getDisplayCountryCode(code);

              text.appendChild(flag);
              text.appendChild(codeNode);
              label.appendChild(bg);
              label.appendChild(text);
              labelsLayer.appendChild(label);
              labelByCountry.set(code, label);
              return label;
            }

            function getStablePillAppearDelay(countryCode, fallbackIndex) {
              const code = String(countryCode || "")
                .trim()
                .toUpperCase();
              if (!code) {
                return 0.95 + Math.max(0, Number(fallbackIndex) || 0) * 0.07;
              }
              // Deterministic pseudo-random spread so pills appear sporadically
              // over ~1500ms, but remain stable across reloads.
              let seed = 0;
              for (let i = 0; i < code.length; i += 1) {
                seed = (seed * 31 + code.charCodeAt(i)) % 2147483647;
              }
              const normalized = (seed % 1000) / 1000; // 0..0.999
              const base = 0.9;
              const spread = 1.5;
              return base + normalized * spread;
            }

            function positionAndSizeCountryLabel(labelNode, countryCode, labelIndex) {
              if (!labelNode) return;
              const code = String(countryCode || "").trim().toUpperCase();
              const countryPath = pathByCountry.get(code) || document.getElementById(code);
              if (!countryPath) return;
              const info = ensureCountryData(code);
              const textNode = labelNode.querySelector(".pill-text");
              if (textNode) {
                const flagNode = textNode.querySelector(".flag");
                const codeNode = textNode.querySelector(".code");
                if (flagNode) {
                  flagNode.textContent = info && info.flag ? info.flag : toFlagEmoji(code) || "🏳️";
                }
                if (codeNode) {
                  codeNode.textContent = getDisplayCountryCode(code);
                }
              }
              const appearDelay = getStablePillAppearDelay(code, labelIndex);
              labelNode.style.setProperty(
                "--pill-delay",
                `${appearDelay.toFixed(3)}s`,
              );
              const box = countryPath.getBBox();
              const centerX = box.x + box.width / 2;
              const labelOffsetY = code === "NO" ? 40 : 0;
              const centerY = box.y + box.height / 2 + labelOffsetY;
              labelNode.style.setProperty("--tx", `${centerX.toFixed(1)}px`);
              labelNode.style.setProperty("--ty", `${centerY.toFixed(1)}px`);

              const pillText = labelNode.querySelector(".pill-text");
              const pillBg = labelNode.querySelector(".pill-bg");
              if (pillText && pillBg) {
                const textBox = pillText.getBBox();
                const padX = 9;
                const padY = 3;
                const width = textBox.width + padX * 2;
                const height = textBox.height + padY * 2;
                pillBg.setAttribute("x", (-width / 2).toFixed(1));
                pillBg.setAttribute("y", (-height / 2).toFixed(1));
                pillBg.setAttribute("width", width.toFixed(1));
                pillBg.setAttribute("height", height.toFixed(1));
                pillBg.setAttribute("rx", (height / 2).toFixed(1));
                pillBg.setAttribute("ry", (height / 2).toFixed(1));

                if (!labelNode.querySelector(".country-label-loader")) {
                  const loaderGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
                  loaderGroup.setAttribute("class", "country-label-loader");
                  loaderGroup.setAttribute(
                    "transform",
                    `translate(${(width / 2 + 16).toFixed(1)} 0)`,
                  );
                  const loaderBg = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                  loaderBg.setAttribute("class", "loader-bg");
                  loaderBg.setAttribute("cx", "0");
                  loaderBg.setAttribute("cy", "0");
                  loaderBg.setAttribute("r", "7.5");
                  const loaderRing = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                  loaderRing.setAttribute("class", "loader-ring");
                  loaderRing.setAttribute("cx", "0");
                  loaderRing.setAttribute("cy", "0");
                  loaderRing.setAttribute("r", "5.2");
                  loaderGroup.appendChild(loaderBg);
                  loaderGroup.appendChild(loaderRing);
                  labelNode.appendChild(loaderGroup);
                } else {
                  const loaderGroup = labelNode.querySelector(".country-label-loader");
                  if (loaderGroup) {
                    loaderGroup.setAttribute(
                      "transform",
                      `translate(${(width / 2 + 16).toFixed(1)} 0)`,
                    );
                  }
                }
              }
            }

            function applyCountryStatusVisual(countryId) {
              const code = String(countryId || "").trim().toUpperCase();
              const pathNode = pathByCountry.get(code) || document.getElementById(code);
              if (!pathNode) return;
              ensureCountryData(code);
              const statusValue = normalizeStatusValue(countryStatus[code] || "no_data");
              pathNode.classList.remove(...statusClassList);
              pathNode.classList.add(`is-status-${statusValue}`);
              const interactive = isStatusActive(statusValue);
              pathNode.classList.toggle("is-hover-enabled", interactive);
              if (!interactive) {
                pathNode.classList.remove("is-lifted");
                if (hoveredCountryPath === pathNode) {
                  hoveredCountryPath = null;
                  hideCountryTrail();
                }
              }
              const labelNode = interactive ? createCountryLabel(code) : labelByCountry.get(code);
              if (labelNode) {
                positionAndSizeCountryLabel(labelNode, code, labelByCountry.size - 1);
                labelNode.classList.toggle("is-hidden", !interactive);
                if (!interactive) {
                  labelNode.classList.remove("is-hover");
                  labelNode.classList.remove("is-loading");
                }
              }
              setPendingCountryHint(code, statusValue === "pending");
            }

            function applyAllCountryStatuses() {

            function updateCountryStatusFromEditor(payload) {

              return { countryId, statusValue: nextStatus };
